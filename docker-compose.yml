services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-8.19.11}
    container_name: elk-elasticsearch
    environment:
      # Noeud unique pour un usage local, sans cluster multi-noeuds.
      - discovery.type=single-node
      # Securite desactivee pour simplifier le TP en local.
      - xpack.security.enabled=false
      # Memoire Java limitee a 512 Mo pour eviter de surcharger la machine.
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  logstash:
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION:-8.19.11}
    container_name: elk-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "5044:5044"
      - "5000:5000"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logs:/var/log/demo:ro
      - ./log_analysed:/var/log/analysed:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-8.19.11}
    container_name: elk-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"

volumes:
  esdata:
