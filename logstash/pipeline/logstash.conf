input {
  file {
    path => "/var/log/demo/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    mode => "read"
  }

  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  if [message] {
    mutate {
      strip => ["message"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-demo-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
